        const calculateTotalScoreCustom = (student, sectionsArray) => {
            let totalPercent = 0, hasPercent = false, totalManual = 0;
            (sectionsArray || []).forEach(s => {
                 s.groups?.forEach(g => {
                    g.columns?.forEach(c => {
                         if (c.type === 'percent') {
                             let total = 0, max = 0;
                             g.columns.filter(cl => (cl.type === 'manual' || cl.type === 'check')).forEach(cl => {
                                 let v = student.scores?.[cl.id];
                                 let pVal = cl.type === 'check' ? (v ? parseFloat(cl.max || 0) : 0) : parseFloat(v || 0);
                                 total += pVal; max += parseFloat(cl.max || 0);
                             });
                             let val = '-';
                             if (c.type === 'sum') val = Math.ceil(total);
                             if (c.type === 'percent') val = max === 0 ? 0 : Math.ceil((total / max) * (c.max || 100));

                             if (val !== '-') totalPercent += parseFloat(val);
                             hasPercent = true;
                         } else if (c.type === 'manual') {
                             totalManual += parseFloat(student.scores?.[c.id] || 0);
                         } else if (c.type === 'check') {
                             totalManual += student.scores?.[c.id] ? parseFloat(c.max || 0) : 0;
                         }
                    });
                 });
            });
            return Math.ceil(hasPercent ? totalPercent : totalManual);
        };

        function VirtualNumpad({ isOpen, onInput, onClose }) {
            const { useState, useRef, useEffect } = React;
            if (!isOpen) return null;
            const [pos, setPos] = useState({ x: window.innerWidth - 280, y: 100 });
            const [dragging, setDragging] = useState(false);
            const offset = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const move = (e) => { if (dragging) setPos({ x: e.clientX - offset.current.x, y: e.clientY - offset.current.y }); };
                const up = () => setDragging(false);
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            }, [dragging]);

            return (
                <div className="fixed z-[150] bg-white rounded-2xl shadow-2xl border border-slate-200 w-64 overflow-hidden animate-scale virtual-numpad" style={{ left: pos.x, top: pos.y }}>
                    <div className="bg-slate-100 p-2 cursor-move flex justify-between items-center border-b border-slate-200" onMouseDown={e => { setDragging(true); offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }}>
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wide flex items-center gap-1"><Icons.Calculator size={12}/> Keypad</span>
                        <button onClick={onClose}><Icons.X size={14} className="text-slate-400 hover:text-red-500"/></button>
                    </div>
                    <div className="grid grid-cols-3 gap-2 p-3 bg-slate-50">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, '.', 0].map(k => (
                            <button key={k} onClick={() => onInput(k)} className="h-12 bg-white rounded-lg shadow-sm border border-slate-200 font-bold text-xl text-slate-700 active:scale-95 transition hover:bg-primary-50 hover:border-primary-200">{k}</button>
                        ))}
                        <button onClick={() => onInput('Del')} className="h-12 bg-red-50 rounded-lg shadow-sm border border-red-100 font-bold text-red-500 active:scale-95 transition flex items-center justify-center"><Icons.Backspace size={20}/></button>
                    </div>
                </div>
            );
        }

                        console.error("Error fetching homeroom data:", e);
                        showToast('เกิดข้อผิดพลาดในการโหลดข้อมูลห้องเรียน', 'error');
                    }
                    setIsHomeroomLoading(false);
                };

                fetchHomeroomData();
            }, [view, loggedUser, masterData.courses]);

            useEffect(() => {
                if(!user || !activeCourseId || view === 'homeroom_view') return;
                const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', `presence_${activeCourseId}`, user.uid);
                const heartbeat = setInterval(() => {
                    setDoc(presenceRef, { lastSeen: Date.now(), role: view === 'student' ? 'student' : 'teacher', viewing: studentViewData?.name || null }, { merge: true });
                }, 10000);
                
                let unsubPresence = () => {};
                if(view === 'teacher_view') {
                    unsubPresence = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `presence_${activeCourseId}`), (snap) => {
                        const active = [];
                        const now = Date.now();
                        snap.forEach(d => { if (now - d.data().lastSeen < 60000) active.push(d.data()); });
                        setPresence(active);
                    });
                }
                return () => { clearInterval(heartbeat); unsubPresence(); };
            }, [user, view, studentViewData, activeCourseId]);

            const activeCourseObj = masterData.courses?.find(c => c.id === activeCourseId) || {};
            const uniqueRooms = useMemo(() => [...new Set(students.map(s => s.room).filter(Boolean))].sort(), [students]);
            
            const visibleCourses = useMemo(() => {
                if (!masterData.courses) return [];
                if (loggedUser?.role === 'admin') return masterData.courses;
                if (loggedUser?.role === 'teacher') return masterData.courses.filter(c => c.teacherId === loggedUser.id);
                return masterData.courses;
            }, [masterData.courses, loggedUser]);

            useEffect(() => {
                if (teacherTab === 'random' && !randomRoom) {
                    if (selectedRoom !== 'All') setRandomRoom(selectedRoom);
                    else if (uniqueRooms.length > 0) setRandomRoom(uniqueRooms[0]);
                }
            }, [teacherTab, uniqueRooms, selectedRoom, randomRoom]);

            useEffect(() => {
                if(!studentViewData || view !== 'student') {
                    setIsSimulateMode(false); setSimulatedScores({});
                }
            }, [studentViewData, view, activeCourseId]);

            const showToast = (msg, type='info') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };
            const getScore = (s, cId) => s.scores?.[cId] || '';
            
            const calculateTotalMaxScore = (includeHidden = false) => {
                let totalPercent = 0, hasPercent = false, totalManual = 0;
                sections.forEach(s => {
                     if (!includeHidden && s.published === false) return;
                     s.groups?.forEach(g => {
                        if (!includeHidden && g.published === false) return;
                        g.columns?.forEach(c => {
                             if (!includeHidden && c.published === false) return;
                             if (c.type === 'percent') {
                                 totalPercent += parseFloat(c.max || 100);
                                 hasPercent = true;
                             } else if (c.type === 'manual' || c.type === 'check') {
                                 totalManual += parseFloat(c.max || 0);
                             }
                        });
                     });
                });
                return Math.ceil(hasPercent ? totalPercent : totalManual);
            };

            const calculateAutoScore = (s, g, c, includeHidden = false) => {
                if (!g.columns) return '-';
                let total = 0, max = 0;
                g.columns.filter(cl => (cl.type === 'manual' || cl.type === 'check') && (includeHidden || cl.published !== false)).forEach(cl => {
                    let v = s.scores?.[cl.id];
                    let pVal = cl.type === 'check' ? (v ? parseFloat(cl.max || 0) : 0) : parseFloat(v || 0);
                    total += pVal; max += parseFloat(cl.max || 0);
                });
                if (c.type === 'sum') return Math.ceil(total);
                if (c.type === 'percent') return max === 0 ? 0 : Math.ceil((total / max) * (c.max || 100));
                return '-';
            };

            const calculateTotalScore = (student, includeHidden = false) => {
                return calculateTotalScoreCustom(student, includeHidden ? sections : sections.map(s => s.published===false ? {...s, groups:[]} : s));
            };

            const calculateGrade = (score) => {
                return calculateGradeCustom(score, courseConfig.grading); 
            };

            const calculateColumnStats = (col) => {
                const scores = filteredStudents.map(s => col.type === 'check' ? (s.scores?.[col.id] ? parseFloat(col.max || 0) : 0) : parseFloat(s.scores?.[col.id] || 0));
                if (scores.length === 0) return { avg: '-', max: '-', min: '-' };
                const sum = scores.reduce((a, b) => a + b, 0);
                const avg = (sum / scores.length).toFixed(1);
                const max = Math.max(...scores);
                const min = Math.min(...scores);
                return { avg, max, min };
            };

            const saveMasterData = async (newData) => {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'master', 'info'), newData, { merge: true });
            };
            
            const saveCourseConfigData = async (newSecs, newGrading, newDrawnIds, newShowGrade) => {
                const payload = {};
                if(newSecs !== null) payload.sections = newSecs;
                if(newGrading !== null) payload.grading = newGrading;
                if(newDrawnIds !== null) payload.drawnIds = newDrawnIds;
                if(newShowGrade !== undefined && newShowGrade !== null) payload.showGrade = newShowGrade;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `config_${activeCourseId}`, 'main'), payload, { merge: true });
            };

            const updateStudent = async (data) => {
                if (!user || !activeCourseId) return;
                try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `students_${activeCourseId}`, data.id), data, { merge: true }); showToast('บันทึกแล้ว', 'success'); }
                catch (e) { showToast('Error', 'error'); }
            };
            
            const deleteStudent = async (id) => {
                setModal({ type: 'confirm', title: 'ยืนยันลบ', message: 'ลบข้อมูลนักเรียนนี้?', onConfirm: async () => {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `students_${activeCourseId}`, id)); setModal(null); showToast('ลบแล้ว', 'success');
                }});
            };
            
            const logAccess = (s, courseIdOverride) => {
                const cid = courseIdOverride || activeCourseId;
                if(!cid) return;
                addDoc(collection(db, 'artifacts', appId, 'public', 'data', `logs_${cid}`), {
                    student: s.name, id: s.id, room: s.room, time: Date.now()
                });
            };

            const handleStudentSearch = async () => {
                if (!studentSearchInput.trim()) {
                    showToast('กรุณากรอกรหัสประจำตัวนักเรียน', 'error');
                    return;
                }
                
                setIsSearchingStudent(true);
                setFoundStudentCourses([]);
                setSelectedStudentCourse(null);
                setStudentViewData(null);
                setActiveCourseId('');

                const results = [];
                const searchVal = studentSearchInput.trim();
                const courses = masterData.courses || [];
                
                const batchSize = 20;
                for (let i = 0; i < courses.length; i += batchSize) {
                    const batch = courses.slice(i, i + batchSize);
                    const promises = batch.map(async (course) => {
                        try {
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', `students_${course.id}`, searchVal);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                return { course, studentData: { id: docSnap.id, ...docSnap.data() } };
                            } else {
                                const q = query(collection(db, 'artifacts', appId, 'public', 'data', `students_${course.id}`), where('name', '==', searchVal));
                                const snap = await getDocs(q);
                                if (!snap.empty) {
                                    const d = snap.docs[0];
                                    return { course, studentData: { id: d.id, ...d.data() } };
                                }
                            }
                        } catch (e) { console.error(e); }
                        return null;
                    });
                    
                    const batchResults = await Promise.all(promises);
                    batchResults.forEach(r => { if(r) results.push(r); });
                }

                setFoundStudentCourses(results);
                setIsSearchingStudent(false);
                
                if (results.length === 0) {
                    showToast('ไม่พบข้อมูลของคุณในรายวิชาใดๆ', 'error');
                } else {
                    showToast(`พบข้อมูลใน ${results.length} รายวิชา`, 'success');
                }
            };

            const handleSelectCourse = (res) => {
                setActiveCourseId(res.course.id);
                setStudentViewData(res.studentData);
                setSelectedStudentCourse(res);
                logAccess(res.studentData, res.course.id);
            };

            const handleLogin = () => {
                if (loginTab === 'admin') {
                    if (loginAdminPassword === masterData.adminPassword) {
                        const userData = { role: 'admin' };
                        setLoggedUser(userData);
                        localStorage.setItem('gradeProUser', JSON.stringify(userData));
                        setView('admin_dashboard');
                        showToast('เข้าสู่ระบบผู้ดูแลระบบสำเร็จ', 'success');
                    } else {
                        showToast('รหัสผ่านแอดมินไม่ถูกต้อง', 'error');
                    }
                } else {
                    if (!loginTeacherId) return showToast('กรุณาเลือกชื่อครูผู้สอน', 'error');
                    const teacher = masterData.teachers?.find(t => t.id === loginTeacherId);
                    if (teacher && teacher.pin === loginTeacherPin) {
                        const userData = { role: 'teacher', id: teacher.id, name: teacher.name, homeroom: teacher.homeroom };
                        setLoggedUser(userData);
                        localStorage.setItem('gradeProUser', JSON.stringify(userData));
                        setView('teacher_dashboard');
                        showToast(`ยินดีต้อนรับ ${teacher.name}`, 'success');
                    } else {
                        showToast('รหัส PIN ไม่ถูกต้อง', 'error');
                    }
                }
            };

            const handleLogout = () => {
                setLoggedUser(null);
                localStorage.removeItem('gradeProUser');
                setView('student');
                setStudentViewData(null);
                setSearchQuery('');
                setStudentSearchInput('');
                setFoundStudentCourses([]);
                setSelectedStudentCourse(null);
                setLoginAdminPassword('');
                setLoginTeacherPin('');
            };

            const handleExportCSV = () => {
                let csv = "\uFEFFเลขที่,รหัส,ชื่อ,ห้อง";
                sections.forEach(s => {
                    s.groups?.forEach(g => {
                        g.columns?.forEach(c => { csv += `,${c.name}(${c.max})`; });
                    });
                });
                csv += ",รวม,เกรด\n";
                filteredStudents.forEach(s => {
                    let row = `${s.no},${s.id},${s.name},${s.room}`;
                    sections.forEach(sec => {
                        sec.groups?.forEach(grp => {
                             grp.columns?.forEach(col => {
                                const val = col.type === 'manual' ? getScore(s, col.id) : col.type === 'check' ? (getScore(s, col.id) ? col.max : 0) : calculateAutoScore(s, grp, col, true);
                                row += `,${val || ''}`;
                             });
                        });
                    });
                    const total = calculateTotalScore(s, true);
                    row += `,${total},${calculateGrade(total)}`;
                    csv += row + "\n";
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob); link.download = `scores_${activeCourseObj.code}.csv`;
                link.click();
            };

            const handleBackup = () => {
                const data = JSON.stringify({ students, sections, config: courseConfig, courseInfo: activeCourseObj });
                const blob = new Blob([data], { type: 'application/json' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob); link.download = `backup_${activeCourseObj.code}.json`;
                link.click();
            };

            const handleDownloadTemplate = () => {
                const csv = "\uFEFFรหัสประจำตัว,ชื่อ-นามสกุล,ห้อง,เลขที่\n10001,ด.ช. สมชาย ใจดี,1/1,1\n10002,ด.ญ. สมหญิง รักเรียน,1/1,2\n";
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob); 
                link.download = `template_students_${activeCourseObj?.code || 'course'}.csv`;
                link.click();
            };

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsImporting(true);
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const text = event.target.result;
                        const lines = text.split('\n');
                        const batch = writeBatch(db);
                        let c = 0;
                        
                        for (let i = 1; i < lines.length; i++) {
                            const line = lines[i].trim();
                            if (!line) continue;
                            const p = line.split(',');
                            if (p.length >= 2) {
                                const id = p[0].trim().replace(/['"]/g, '');
                                const name = p[1].trim().replace(/['"]/g, '');
                                const room = p[2] ? p[2].trim().replace(/['"]/g, '') : '';
                                const no = p[3] ? p[3].trim().replace(/['"]/g, '') : '';
                                
                                if (id && name) {
                                    batch.set(doc(db, 'artifacts', appId, 'public', 'data', `students_${activeCourseId}`, id), { id, name, room, no, scores: {} }, { merge: true });
                                    c++;
                                }
                            }
                        }
                        
                        if (c > 0) { 
                            await batch.commit(); 
                            showToast(`นำเข้านักเรียน ${c} คน เรียบร้อย`, 'success'); 
                            setModal(null); 
                        } else { showToast('ไม่พบข้อมูล หรือรูปแบบไฟล์ไม่ถูกต้อง', 'error'); }
                    } catch (err) { console.error(err); showToast('เกิดข้อผิดพลาดในการอ่านไฟล์', 'error'); } 
                    finally { setIsImporting(false); e.target.value = null; }
                };
                reader.readAsText(file);
            };

            const handleRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.students && data.sections) {
                            setModal({
                                type: 'confirm',
                                title: 'ยืนยันการกู้คืน',
                                message: `ข้อมูลของรายวิชาปัจจุบัน (${activeCourseObj.name}) จะถูกเขียนทับ ยืนยันการกู้คืน?`,
                                onConfirm: async () => {
                                    await saveCourseConfigData(data.sections, data.config?.grading || DEFAULT_GRADING, data.config?.drawnIds || [], data.config?.showGrade || false);
                                    const batch = writeBatch(db);
                                    data.students.forEach(s => { batch.set(doc(db, 'artifacts', appId, 'public', 'data', `students_${activeCourseId}`, s.id), s); });
                                    await batch.commit();
                                    showToast('กู้คืนข้อมูลสำเร็จ!', 'success');
                                    setModal(null);
                                    window.location.reload();
                                }
                            });
                        } else { showToast('ไฟล์ไม่ถูกต้อง', 'error'); }
                    } catch (err) { console.error(err); showToast('เกิดข้อผิดพลาดในการอ่านไฟล์', 'error'); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const handleClearData = async () => {
                setModal({ type: 'confirm', title: '⚠ ล้างข้อมูลวิชานี้', message: `คุณแน่ใจหรือไม่ที่จะลบข้อมูลนักเรียนและคะแนนทั้งหมดของรายวิชา ${activeCourseObj.name}?`, onConfirm: async () => {
                    const batch = writeBatch(db);
                    students.forEach(s => { batch.delete(doc(db, 'artifacts', appId, 'public', 'data', `students_${activeCourseId}`, s.id)); });
                    await batch.commit();
                    setModal(null);
                    showToast('ล้างข้อมูลเรียบร้อย', 'success');
                }});
            };

            const openScoreModal = (student, column) => {
                setActiveScoreEntry({ student, column, currentVal: student.scores?.[column.id] || '' });
            };
            const handleScoreSave = (val) => {
                if(!activeScoreEntry) return;
                const { student, column } = activeScoreEntry;
                if (val === '' || (!isNaN(val) && parseFloat(val) <= parseFloat(column.max))) {
                    const newScores = { ...student.scores, [column.id]: val };
                    setStudents(prev => prev.map(p => p.id === student.id ? { ...student, scores: newScores } : p)); 
                    updateStudent({ ...student, scores: newScores });
                }
            };
            const navigateScoreEntry = (direction) => {
                if(!activeScoreEntry) return;
                const idx = filteredStudents.findIndex(s => s.id === activeScoreEntry.student.id);
                const nextIdx = idx + direction;
                if(nextIdx >= 0 && nextIdx < filteredStudents.length) {
                    const nextStudent = filteredStudents[nextIdx];
                    setActiveScoreEntry({ ...activeScoreEntry, student: nextStudent, currentVal: nextStudent.scores?.[activeScoreEntry.column.id] || '' });
                }
            };

            const spinWheel = () => {
                if (isSpinning || wheelStudents.length === 0) return;
                setIsSpinning(true); setRandomWinner(null); setIsZooming(false);
                
                const n = wheelStudents.length;
                const winnerIndex = Math.floor(Math.random() * n);
                const sliceAngle = 360 / n;
                const landingAngle = winnerIndex * sliceAngle + (sliceAngle / 2);
                const extraSpins = 360 * Math.floor(spinDuration * 1.2); 
                const currentMod = wheelRotation % 360;
                const offset = 360 - landingAngle - currentMod;
                const targetRotation = wheelRotation + extraSpins + offset;
                
                setWheelRotation(targetRotation);
                
                setTimeout(() => { setIsZooming(true); }, Math.max(0, (spinDuration * 1000) - 2000)); 
                
                setTimeout(() => {
                    setIsSpinning(false);
                    const winner = wheelStudents[winnerIndex];
                    setRandomWinner(winner);
                    setWinnerModal(winner); 
                    
                    const nextIds = [...courseConfig.drawnIds, winner.id];
                    setCourseConfig(prev => ({...prev, drawnIds: nextIds}));
                    saveCourseConfigData(null, null, nextIds, null);
                }, spinDuration * 1000); 
            };

            const restoreToWheel = (student) => {
                const nextIds = courseConfig.drawnIds.filter(id => id !== student.id);
                setCourseConfig(prev => ({...prev, drawnIds: nextIds}));
                saveCourseConfigData(null, null, nextIds, null);
                if (randomWinner && randomWinner.id === student.id) { setRandomWinner(null); setIsZooming(false); }
            };
            
            const restoreAllToWheel = () => {
                setModal({
                    type: 'confirm',
                    title: 'ยืนยันการคืนค่า',
                    message: 'ต้องการคืนค่าผู้ที่ถูกสุ่มไปแล้วของห้องนี้ กลับเข้าสู่วงล้อทั้งหมดหรือไม่?',
                    onConfirm: () => {
                        const roomIds = randomHistory.map(s => s.id);
                        const nextIds = courseConfig.drawnIds.filter(id => !roomIds.includes(id));
                        setCourseConfig(prev => ({...prev, drawnIds: nextIds}));
                        saveCourseConfigData(null, null, nextIds, null);
                        setRandomWinner(null); setIsZooming(false);
                        setModal(null);
                    }
                });
            };

            const filteredStudents = useMemo(() => {
                let res = students;
                if (selectedRoom !== 'All') res = res.filter(s => s.room === selectedRoom);
                if (searchQuery) { const q = searchQuery.toLowerCase(); res = res.filter(s => s.id.includes(q) || s.name.toLowerCase().includes(q)); }
                return res.sort((a,b) => (a.room === b.room ? (parseInt(a.no)||0)-(parseInt(b.no)||0) : a.room.localeCompare(b.room)));
            }, [students, selectedRoom, searchQuery]);
            
            const analysisData = useMemo(() => {
                const data = { high: [], mid: [], low: [], avgScore: '0.0', maxScore: 100 };
                if (filteredStudents.length === 0) return data;
                
                const currentTotalMax = calculateTotalMaxScore(true) || 1;
                data.maxScore = currentTotalMax;

                let totalSum = 0;
                const studentScores = filteredStudents.map(s => {
                    const score = calculateTotalScore(s, true);
                    totalSum += score;
                    return { student: s, score };
                });
                
                data.avgScore = (totalSum / filteredStudents.length).toFixed(1);
                
                const thresholdHigh = currentTotalMax * 0.70;
                const thresholdLow = currentTotalMax * 0.30;
                
                studentScores.forEach(({ student, score }) => {
                    if (score > thresholdHigh) {
                        data.high.push(student);
                    } else if (score < thresholdLow) {
                        data.low.push(student);
                    } else {
                        data.mid.push(student);
                    }
                });
                
                data.high.sort((a,b) => calculateTotalScore(b, true) - calculateTotalScore(a, true));
                data.mid.sort((a,b) => calculateTotalScore(b, true) - calculateTotalScore(a, true));
                data.low.sort((a,b) => calculateTotalScore(b, true) - calculateTotalScore(a, true));
                
                return data;
            }, [filteredStudents, sections]);

            const wheelStudents = useMemo(() => {
                if (!randomRoom) return [];
                return students.filter(s => 
                    s.room === randomRoom && 
                    !(courseConfig.drawnIds || []).includes(s.id)
                );
            }, [students, randomRoom, courseConfig.drawnIds]);

            const randomHistory = useMemo(() => {
                if (!randomRoom) return [];
                return students.filter(s => 
                    s.room === randomRoom && 
                    (courseConfig.drawnIds || []).includes(s.id)
                );
            }, [students, randomRoom, courseConfig.drawnIds]);
            
            const activeStudentData = useMemo(() => {
                if (!studentViewData) return null;
                if (!isSimulateMode) return studentViewData;
                return { ...studentViewData, scores: { ...(studentViewData.scores || {}), ...simulatedScores } };
            }, [studentViewData, isSimulateMode, simulatedScores]);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div></div>;

            return (
                <div className="min-h-screen pb-20 font-sans overflow-x-hidden">
                    {toast && <div className={`fixed top-4 right-4 z-[300] px-6 py-3 rounded-xl shadow-lg font-bold text-white animate-fade-in toast-container no-print ${toast.type==='error'?'bg-red-500':'bg-green-500'}`}>{toast.msg}</div>}
                    
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm glass-panel no-print">
                        <div className="w-full px-4 h-16 flex justify-between items-center max-w-7xl mx-auto">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => { 
                                setView('student'); 
                                setStudentViewData(null); 
                                setSearchQuery(''); 
                                setStudentSearchInput('');
                                setFoundStudentCourses([]);
                                setSelectedStudentCourse(null);
                            }}>
                                <div className="relative flex items-center justify-center w-10 h-10 md:w-11 md:h-11 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl md:rounded-2xl shadow-lg shadow-primary-500/30 group-hover:shadow-primary-500/50 group-hover:-translate-y-0.5 transition-all duration-300">
                                    <div className="absolute inset-0 rounded-xl md:rounded-2xl bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    <Icons.BookOpen size={22} className="text-white relative z-10"/>
                                </div>
                                <div className="flex flex-col justify-center">

                                    </div>
                                    <div className="text-right">
                                        <p><strong>ครูผู้สอน:</strong> {masterData.teachers?.find(t => t.id === activeCourseObj.teacherId)?.name || masterData.teacher}</p>
                                        <p><strong>ระดับชั้น:</strong> {studentViewData.room} &nbsp;&nbsp; <strong>เลขที่:</strong> {studentViewData.no}</p>
                                    </div>
                                </div>
                                <table>
                                    <thead><tr><th className="text-left" style={{width: '60%'}}>รายการประเมิน</th><th style={{width: '20%'}}>คะแนนเต็ม</th><th style={{width: '20%'}}>คะแนนที่ได้</th></tr></thead>
                                    <tbody>
                                        {sections.map(sec => sec.published !== false && (
                                            <React.Fragment key={sec.id}>
                                                <tr><td colSpan="3" className="text-left font-bold" style={{backgroundColor: '#f9f9f9'}}>{sec.title}</td></tr>
                                                {sec.groups?.map(grp => grp.published !== false && grp.columns?.map(col => { 
                                                    if(col.published === false) return null; 
                                                    let val = col.type === 'manual' || col.type === 'check' ? getScore(studentViewData, col.id) : calculateAutoScore(studentViewData, grp, col);
                                                    if(col.type === 'check') val = val ? col.max : '0';
                                                    return (
                                                        <tr key={col.id}><td className="text-left">{col.name}</td><td>{col.max}</td><td className="font-bold">{val || '-'}</td></tr>
                                                    ); 
                                                }))}
                                            </React.Fragment>
                                        ))}
                                        <tr><td className="text-right font-bold" style={{borderTop: '2px solid black'}}>รวมคะแนน</td><td style={{borderTop: '2px solid black'}}>{calculateTotalMaxScore(false)}</td><td className="font-bold" style={{borderTop: '2px solid black'}}>{calculateTotalScore(studentViewData)}</td></tr>
                                        <tr><td className="text-right font-bold">เกรดที่ได้</td><td colSpan="2" className="font-bold text-center" style={{fontSize: '16pt'}}>{courseConfig.showGrade ? calculateGrade(calculateTotalScore(studentViewData)) : 'รอประกาศ'}</td></tr>
                                    </tbody>
                                </table>
                                {studentViewData.note && <div className="official-info mt-4"><strong>หมายเหตุ:</strong> {studentViewData.note}</div>}
                                <div className="signature-area" style={{justifyContent: 'flex-end', paddingRight: '50px', marginTop: '40px'}}>
                                    <div className="signature-box"><div className="signature-line"></div><p>( {masterData.teachers?.find(t => t.id === activeCourseObj.teacherId)?.name || masterData.teacher} )</p><p>ครูผู้สอน</p><p style={{marginTop: '10px', fontSize: '12pt'}}>วันที่ ......../......../........</p></div>
                                </div>
                            </div>
                        )}
                        
                        {!studentViewData && teacherTab === 'scores' && activeCourseObj && (
                            <div className="p-2 landscape-mode">
                                <div className="text-center mb-6">
                                    <h1 className="official-title">แบบบันทึกผลการประเมินคุณภาพผู้เรียน</h1>
                                    <h2 className="official-subtitle">รายวิชา {activeCourseObj.name} ({activeCourseObj.code}) ชั้น {selectedRoom} ปีการศึกษา {activeCourseObj.year} โรงเรียน{masterData.school}</h2>
                                </div>
                                <table>
                                    <thead>
                                        <tr>
                                            <th rowSpan="3" className="text-center" style={{width: '40px'}}>ที่</th>
                                            <th rowSpan="3" style={{width: '80px'}}>รหัส</th>
                                            <th rowSpan="3" style={{width: '200px'}}>ชื่อ-นามสกุล</th>
                                            <th rowSpan="3" style={{width: '50px'}}>ห้อง</th>
                                            {sections.map(sec => {
                                                let cols = 0;
                                                sec.groups?.forEach(g => { cols += (g.columns?.length || 0); });
                                                if(cols===0) return null;
                                                return <th key={sec.id} colSpan={cols}>{sec.title} {sec.published === false ? '(ซ่อน)' : ''}</th>;
                                            })}
                                            <th rowSpan="3" style={{width: '50px'}}>รวม</th>
                                            {courseConfig.showGrade && <th rowSpan="3" style={{width: '50px'}}>เกรด</th>}
                                        </tr>
                                        <tr>
                                            {sections.map(sec => {
                                                let cols = 0; sec.groups?.forEach(g => { cols += (g.columns?.length || 0); }); if(cols===0) return null;
                                                return sec.groups?.map(g => {
                                                    let gCols = g.columns?.length || 0; if(gCols === 0) return null;
                                                    return <th key={g.id} colSpan={gCols}>{g.title} {g.published === false ? '(ซ่อน)' : ''}</th>;
                                                });
                                            })}
                                        </tr>
                                        <tr>
                                            {sections.map(sec => {
                                                return sec.groups?.map(g => {
                                                    return g.columns?.map(col => {
                                                        const isHidden = sec.published === false || g.published === false || col.published === false;
                                                        return <th key={col.id} className={`vertical-text-print ${isHidden ? 'text-slate-400' : ''}`}>{col.name} {isHidden ? '(ซ่อน)' : ''}</th>;
                                                    });
                                                });
                                            })}
                                        </tr>
                                        <tr>
                                            <th colSpan="4" className="text-right">คะแนนเต็ม</th>
                                            {sections.map(sec => {
                                                return sec.groups?.map(g => {
                                                    return g.columns?.map(col => {
                                                        return <th key={col.id} style={{fontSize:'10pt'}}>{col.max}</th>;
                                                    });
                                                });
                                            })}
                                            <th>{calculateTotalMaxScore(false)}</th>
                                            {courseConfig.showGrade && <th></th>}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredStudents.map(s => { 
                                            const total = calculateTotalScore(s, false); 
                                            return (
                                                <tr key={s.id}>
                                                    <td>{s.no}</td><td>{s.id}</td><td className="text-left">{s.name}</td><td>{s.room}</td>
                                                    {sections.map(sec => sec.groups?.map(g => g.columns?.map(c => { 
                                                        let val = c.type === 'manual' || c.type === 'check' ? s.scores?.[c.id] : calculateAutoScore(s, g, c, false); 
                                                        if(c.type === 'check') val = val ? c.max : '0';
                                                        return <td key={c.id}>{val || '-'}</td> 
                                                    })))}
                                                    <td className="font-bold">{total}</td>
                                                    {courseConfig.showGrade && <td className="font-bold">{calculateGrade(total)}</td>}
                                                </tr>
                                            ); 
                                        })}
                                    </tbody>
                                </table>
                                <div className="signature-area" style={{justifyContent: 'flex-end', paddingRight: '50px', marginTop: '40px'}}>
                                    <div className="signature-box"><div className="signature-line"></div><p>( {masterData.teachers?.find(t => t.id === activeCourseObj.teacherId)?.name || masterData.teacher} )</p><p>ครูผู้สอน</p><p style={{marginTop: '10px', fontSize: '12pt'}}>วันที่ ......../......../........</p></div>
                                </div>
                            </div>
                        )}

                        {view === 'homeroom_view' && loggedUser?.homeroom && (
                            <div className="p-2 landscape-mode">
                                <div className="text-center mb-6">
                                    <h1 className="official-title">แบบสรุปผลการเรียนนักเรียนชั้น {loggedUser.homeroom}</h1>
                                    <h2 className="official-subtitle">โรงเรียน{masterData.school} ครูประจำชั้น {loggedUser.name}</h2>
                                </div>
                                <table>
                                    <thead>
                                        <tr>
                                            <th className="text-center" style={{width: '40px'}}>ที่</th>
                                            <th style={{width: '80px'}}>รหัส</th>
                                            <th style={{width: '200px'}}>ชื่อ-นามสกุล</th>
                                            {homeroomData.courses.map(c => (
                                                <th key={c.id} style={{width: '60px'}}>{c.code}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {homeroomData.students.map(s => (
                                            <tr key={s.id}>
                                                <td className="text-center">{s.no}</td><td className="text-center">{s.id}</td><td className="text-left">{s.name}</td>
                                                {homeroomData.courses.map(c => (
                                                    <td key={c.id} className="text-center font-bold">
                                                        {s.grades[c.id] === 'รอประกาศ' ? '-' : s.grades[c.id] !== undefined ? s.grades[c.id] : '-'}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full h-9 sm:h-10 bg-[#1e293b] text-slate-400 text-[10px] sm:text-xs flex justify-between items-center px-1 sm:px-3 z-[400] font-mono shadow-[0_-10px_30px_rgba(0,0,0,0.3)] no-print border-t border-slate-700 select-none">
                        <div className="flex items-center h-full">
                            <div className="flex items-center gap-2 px-2 sm:px-3 hover:bg-slate-700 h-full transition-colors cursor-default" title="Network Status">
                                <span className="relative flex h-2 w-2">
                                    {isOnline && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>}
                                    <span className={`relative inline-flex rounded-full h-2 w-2 ${isOnline ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                                </span>
                                <span className={`font-bold tracking-wider hidden sm:block ${isOnline ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {isOnline ? 'ONLINE' : 'OFFLINE'}
                                </span>
                            </div>
                            <div className="flex items-center gap-1.5 px-2 sm:px-3 border-l border-slate-700 hover:bg-slate-700 h-full transition-colors cursor-default" title="Database Sync">
                                <Icons.Database size={14} className={isOnline ? 'text-primary-400' : 'text-slate-500'}/> 
                                <span className="hidden sm:inline">{isOnline ? 'Synced: asia-se1' : 'Pending Sync'}</span>
                                <span className="sm:hidden">{isOnline ? 'Synced' : 'Wait'}</span>
                            </div>
                            <div className="hidden lg:flex items-center gap-1.5 px-3 border-l border-slate-700 hover:bg-slate-700 h-full transition-colors cursor-default" title="System Latency">
                                <Icons.Lightning size={14} className="text-amber-500"/>
                                <span>{isOnline ? '12ms' : 'N/A'}</span>
                            </div>
                        </div>

                        <div className="hidden xl:flex items-center gap-2 text-slate-400 hover:text-slate-200 transition-colors cursor-default truncate max-w-sm">
                            <Icons.ShieldCheck size={14} className="text-emerald-500 flex-shrink-0"/>
                            <span className="truncate">Commercial License: {masterData.school}</span>
                        </div>

                        <div className="flex items-center h-full">
                            <div className="hidden md:flex items-center gap-1.5 px-3 border-r border-slate-700 hover:bg-slate-700 h-full transition-colors cursor-default" title="Current Role">
                                <Icons.User size={14} className={!loggedUser ? 'text-slate-500' : 'text-primary-400'}/>
                                <span className="uppercase">{!loggedUser ? 'Guest Access' : (loggedUser.role === 'admin' ? 'Admin Mode' : 'Teacher Mode')}</span>
                            </div>
                            <button onClick={() => setSupportModal(true)} className="flex items-center gap-1.5 px-3 border-r border-slate-700 hover:bg-slate-700 hover:text-white h-full transition-colors group">
                                <Icons.Headset size={16} className="text-slate-400 group-hover:text-primary-400 transition-colors"/>
                                <span className="hidden sm:inline font-sans">แจ้งปัญหา/ติดต่อผู้พัฒนา</span>
                                <span className="sm:hidden font-sans">Support</span>
                            </button>
                            <div className="flex items-center gap-1.5 px-3 bg-primary-600/20 text-primary-400 font-bold h-full border-t-2 border-t-primary-500 cursor-default" title="System Version">
                                <Icons.Cloud size={14}/>
                                <span>GradePro v8.5 PRO</span>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
